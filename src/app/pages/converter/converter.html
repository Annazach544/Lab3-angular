<h2>Konverterare</h2>

<div>
  <h3>Meter till Feet</h3>
  <input type="number" [(ngModel)]="meters">
  <button (click)="convertMetersToFeet()">Konvertera</button>
  <p>{{ feet }} ft</p>
  <input type="number" [(ngModel)]="feet">
  <button (click)="convertFeetToMeters()">Feet till meter</button>
  <p>{{ meters }} m</p>
</div>

<div>
  <h3>Celsius till Fahrenheit</h3>
  <input type="number" [(ngModel)]="celsius">
  <button (click)="convertCelsiusToFahrenheit()">Konvertera</button>
  <p>{{ fahrenheit }} °F</p>
  <input type="number" [(ngModel)]="fahrenheit">
<button (click)="convertFahrenheitToCelsius()">Fahrenheit till Celsius</button>
<p>{{ celsius }} °C</p>
</div>
